name: 构建老八 Windows 便携版

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            python-architecture: x64
            artifact-name: 老八-Windows-x64
          - arch: x86
            python-architecture: x86
            artifact-name: 老八-Windows-x86

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9 (${{ matrix.python-architecture }})
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          architecture: ${{ matrix.python-architecture }}
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Build Windows ${{ matrix.arch }} portable package
        shell: pwsh
        run: |
          $log = "build-${{ matrix.arch }}.log"
          & pwsh -NoLogo -NoProfile -File .\build\build_windows.ps1 -Architecture "${{ matrix.arch }}" *> $log
          $exitCode = $LASTEXITCODE
          Get-Content $log
          if ($exitCode -ne 0) {
            Write-Error "Windows ${{ matrix.arch }} 构建失败，退出代码：$exitCode"
            exit $exitCode
          }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 构建日志-${{ matrix.arch }}
          path: build-${{ matrix.arch }}.log
          if-no-files-found: warn

      - name: Upload ${{ matrix.artifact-name }}
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: release/*-${{ matrix.arch }}*.zip
          if-no-files-found: error
